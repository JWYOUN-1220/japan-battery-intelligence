<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Battery Supply Chain Map</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body class="network-page">

  <div class="network-header">
    <div>
      <h1>Japan Battery Supply Chain Network</h1>
      <p class="network-subtitle">정책 → 상사 → 소재 → 셀 → OEM / 니치 전동화 구조</p>
    </div>
    <div class="network-meta">대외비 · Internal Intelligence</div>
  </div>

  <div class="network-layout">
    <div id="network" class="network-full"></div>

    <aside class="network-panel">
      <h2>상세 정보</h2>
      <p class="panel-desc">
        노드를 클릭하시면 해당 기업 또는 기관과 연결된 관계 정보를 확인하실 수 있습니다.
      </p>

      <div id="panel-default" class="panel-default">
        현재 선택된 노드가 없습니다.
      </div>

      <div id="panel-content" class="panel-content" style="display:none;">
        <div class="panel-section">
          <div class="panel-label">선택 노드</div>
          <div id="selected-node-name" class="panel-node-name"></div>
        </div>

        <div class="panel-section">
          <div class="panel-label">연결 관계</div>
          <div id="selected-node-links" class="panel-links"></div>
        </div>
      </div>
    </aside>
  </div>

  <script>
    fetch("data/network.json")
      .then(response => response.json())
      .then(data => {
        const groupColors = {
          Policy: "#003B70",
          Trading: "#4F81BD",
          Cathode: "#D9534F",
          Precursor: "#F0AD4E",
          Anode: "#5CB85C",
          Cell: "#5BC0DE",
          OEM: "#7E57C2",
          Niche: "#8D6E63",
          GX: "#2E7D32",
          Equipment: "#607D8B"
        };

        const nodeDataset = new vis.DataSet(
          data.nodes.map(node => ({
            id: node.id,
            label: node.id,
            group: node.group,
            color: groupColors[node.group] || "#999999",
            shape: "box",
            font: {
              color: "#ffffff",
              size: 14,
              face: "Arial"
            },
            margin: 10
          }))
        );

        const edgeDataset = new vis.DataSet(
          data.links.map((link, idx) => ({
            id: idx,
            from: link.source,
            to: link.target,
            label: link.type,
            arrows: "to",
            font: {
              align: "middle",
              size: 11,
              face: "Arial"
            },
            color: { color: "#999999" },
            width: 1.2,
            smooth: {
              type: "cubicBezier",
              forceDirection: "horizontal",
              roundness: 0.4
            },
            raw: link
          }))
        );

        const container = document.getElementById("network");

        const network = new vis.Network(
          container,
          { nodes: nodeDataset, edges: edgeDataset },
          {
            layout: {
              hierarchical: {
                enabled: true,
                direction: "LR",
                sortMethod: "directed",
                levelSeparation: 220,
                nodeSpacing: 180,
                treeSpacing: 220,
                blockShifting: true,
                edgeMinimization: true,
                parentCentralization: true
              }
            },
            physics: false,
            interaction: {
              hover: true,
              dragNodes: true,
              dragView: true,
              zoomView: true
            },
            nodes: {
              borderWidth: 1,
              shapeProperties: {
                borderRadius: 6
              }
            },
            edges: {
              width: 1.2
            }
          }
        );

        const panelDefault = document.getElementById("panel-default");
        const panelContent = document.getElementById("panel-content");
        const selectedNodeName = document.getElementById("selected-node-name");
        const selectedNodeLinks = document.getElementById("selected-node-links");

        function resetPanel() {
          panelDefault.style.display = "block";
          panelContent.style.display = "none";
          selectedNodeName.textContent = "";
          selectedNodeLinks.innerHTML = "";
        }

        function resetAll() {
          nodeDataset.get().forEach(node => {
            nodeDataset.update({
              id: node.id,
              color: groupColors[node.group] || "#999999",
              font: { color: "#ffffff", size: 14, face: "Arial" }
            });
          });

          edgeDataset.get().forEach(edge => {
            edgeDataset.update({
              id: edge.id,
              color: { color: "#999999" },
              width: 1.2
            });
          });

          resetPanel();
        }

        function renderPanel(nodeId) {
          const relatedEdges = edgeDataset.get().filter(edge => edge.from === nodeId || edge.to === nodeId);

          panelDefault.style.display = "none";
          panelContent.style.display = "block";
          selectedNodeName.textContent = nodeId;
          selectedNodeLinks.innerHTML = "";

          if (relatedEdges.length === 0) {
            selectedNodeLinks.innerHTML = "<div class='panel-empty'>연결된 관계 정보가 없습니다.</div>";
            return;
          }

          relatedEdges.forEach(edge => {
            const raw = edge.raw || {};
            const otherNode = edge.from === nodeId ? edge.to : edge.from;

            const item = document.createElement("div");
            item.className = "panel-link-item";

            const strength = raw.strength || "보통";
            let badgeClass = "panel-badge-medium";
            if (strength === "높음") badgeClass = "panel-badge-high";
            if (strength === "낮음") badgeClass = "panel-badge-low";

            item.innerHTML = `
              <div class="panel-link-top">
                <span class="panel-badge ${badgeClass}">${strength}</span>
                <span class="panel-link-title">${nodeId} ↔ ${otherNode}</span>
              </div>
              <div class="panel-link-meta">
                <div><strong>관계 유형:</strong> ${raw.type || edge.label || "-"}</div>
                <div><strong>날짜:</strong> ${raw.date || "-"}</div>
              </div>
              <div class="panel-link-note">
                ${raw.note || "추가 설명이 없습니다."}
              </div>
            `;

            selectedNodeLinks.appendChild(item);
          });
        }

        network.on("click", function(params) {
          if (params.nodes.length === 0) {
            resetAll();
            return;
          }

          const selectedNode = params.nodes[0];
          const connectedNodes = network.getConnectedNodes(selectedNode);
          const connectedEdges = network.getConnectedEdges(selectedNode);

          nodeDataset.get().forEach(node => {
            const isActive = node.id === selectedNode || connectedNodes.includes(node.id);

            nodeDataset.update({
              id: node.id,
              color: isActive ? (groupColors[node.group] || "#999999") : "#D3D3D3",
              font: {
                color: isActive ? "#ffffff" : "#AAAAAA",
                size: 14,
                face: "Arial"
              }
            });
          });

          edgeDataset.get().forEach(edge => {
            const isActive = connectedEdges.includes(edge.id);

            edgeDataset.update({
              id: edge.id,
              color: { color: isActive ? "#333333" : "#E0E0E0" },
              width: isActive ? 2 : 1
            });
          });

          renderPanel(selectedNode);
        });

        resetPanel();
      })
      .catch(error => {
        document.getElementById("network").innerHTML =
          "<div style='padding:24px; color:#666;'>network.json을 불러오지 못했습니다.</div>";
        console.error(error);
      });
  </script>
</body>
</html>
