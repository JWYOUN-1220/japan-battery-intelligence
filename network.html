<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Battery Supply Chain Map</title>
  <link rel="stylesheet" href="assets/style.css">
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
</head>
<body class="network-page-simple">

  <div class="network-header-simple">
    <div>
      <h1>Japan Battery Supply Chain Network</h1>
      <p class="network-subtitle">정책 → 상사 → 소재 → 셀 → OEM / 니치 전동화 구조</p>
    </div>
    <div class="network-meta">대외비 · Internal Intelligence</div>
  </div>

  <div id="network" class="network-canvas">
    <div class="network-loading">공급망 데이터를 불러오는 중입니다.</div>
  </div>

  <script>
    const container = document.getElementById("network");

    function showMessage(message) {
      container.innerHTML = `<div class="network-message">${message}</div>`;
    }

    if (typeof vis === "undefined") {
      showMessage("vis-network 라이브러리를 불러오지 못했습니다.");
      throw new Error("vis-network not loaded");
    }

    fetch("data/network.json")
      .then(response => {
        if (!response.ok) {
          throw new Error("network.json 파일을 찾을 수 없습니다.");
        }
        return response.json();
      })
      .then(data => {
        if (!data || !Array.isArray(data.nodes) || !Array.isArray(data.links)) {
          throw new Error("network.json 형식이 올바르지 않습니다.");
        }

        if (data.nodes.length === 0) {
          showMessage("표시할 공급망 데이터가 없습니다.");
          return;
        }

        const groupColors = {
          Policy: "#003B70",
          Trading: "#4F81BD",
          Cathode: "#D9534F",
          Precursor: "#F0AD4E",
          Anode: "#5CB85C",
          Cell: "#5BC0DE",
          OEM: "#7E57C2",
          Niche: "#8D6E63",
          GX: "#2E7D32",
          Equipment: "#607D8B"
        };

        const nodes = new vis.DataSet(
          data.nodes.map(node => ({
            id: node.id,
            label: node.id,
            group: node.group,
            shape: "box",
            margin: 10,
            color: {
              background: groupColors[node.group] || "#999999",
              border: "#ffffff",
              highlight: {
                background: groupColors[node.group] || "#999999",
                border: "#333333"
              }
            },
            font: {
              color: "#ffffff",
              size: 14,
              face: "Arial"
            }
          }))
        );

        const edges = new vis.DataSet(
          data.links.map((link, idx) => ({
            id: idx,
            from: link.source,
            to: link.target,
            label: link.type || "",
            arrows: "to",
            width: 1.5,
            color: {
              color: "#9aa4b2",
              highlight: "#333333"
            },
            font: {
              size: 11,
              align: "middle",
              face: "Arial"
            },
            smooth: {
              enabled: true,
              type: "cubicBezier",
              roundness: 0.25
            }
          }))
        );

        container.innerHTML = "";

        const network = new vis.Network(
          container,
          { nodes, edges },
          {
            autoResize: true,
            physics: false,
            interaction: {
              hover: true,
              dragNodes: true,
              dragView: true,
              zoomView: true
            },
            layout: {
              hierarchical: {
                enabled: true,
                direction: "LR",
                sortMethod: "directed",
                levelSeparation: 180,
                nodeSpacing: 140,
                treeSpacing: 180
              }
            },
            nodes: {
              borderWidth: 1
            },
            edges: {
              width: 1.5
            }
          }
        );

        network.once("afterDrawing", function () {
          network.fit({
            animation: {
              duration: 300,
              easingFunction: "easeInOutQuad"
            }
          });
        });
      })
      .catch(error => {
        console.error(error);
        showMessage("network.json을 불러오지 못했거나 형식이 올바르지 않습니다.");
      });
  </script>
</body>
</html>
