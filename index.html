<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Japan Battery Market Intelligence</title>
<style>
body{
  font-family: Arial, sans-serif;
  margin: 40px;
  background:#f7f9fc;
  color:#1a1a1a;
}
h1{
  color:#005BAC;
}
.section{
  background:#ffffff;
  border:1px solid #d9e2ec;
  border-radius:8px;
  padding:20px;
  margin-bottom:24px;
}
a{
  color:#005BAC;
  text-decoration:none;
}
a:hover{
  text-decoration:underline;
}
ul{
  padding-left:18px;
}
li{
  margin-bottom:8px;
}
.meta{
  color:#666;
  font-size:14px;
}
</style>
</head>
<body>

<h1>Japan Battery Market Intelligence</h1>
<p class="meta">일본 배터리 산업 / GX 뉴스 인텔리전스 아카이브</p>

<div class="section">
  <h2>Daily Reports</h2>
  <ul id="report-list"></ul>
</div>

<div class="section">
  <h2>Supply Chain Map</h2>
  <a href="network.html">Japan Battery Supply Chain Network 보기</a>
</div>

<script>
async function loadReports() {
  try {
    const url = "https://api.github.com/repos/JWYOUN-1220/japan-battery-intelligence/contents/reports";
    const response = await fetch(url);
    const data = await response.json();

    const list = document.getElementById("report-list");

    if (!Array.isArray(data)) {
      list.innerHTML = "<li>리포트 목록을 불러오지 못했습니다.</li>";
      console.error("Unexpected API response:", data);
      return;
    }

    data
      .filter(file => file.name.endsWith(".html"))
      .sort((a, b) => b.name.localeCompare(a.name))
      .forEach(file => {
        const li = document.createElement("li");
        const link = document.createElement("a");
        link.href = "reports/" + file.name;
        link.textContent = file.name.replace(".html", "");
        li.appendChild(link);
        list.appendChild(li);
      });

    if (list.children.length === 0) {
      list.innerHTML = "<li>아직 업로드된 리포트가 없습니다.</li>";
    }

  } catch (error) {
    document.getElementById("report-list").innerHTML =
      "<li>리포트 목록을 불러오지 못했습니다.</li>";
    console.error(error);
  }
}

loadReports();
</script>

</body>
</html>
