<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Japan Battery Market Intelligence</title>

<style>

body{
font-family: Arial;
margin:40px;
background:#f7f7f7;
}

h1{
color:#1a1a1a;
}

a{
text-decoration:none;
color:#0366d6;
}

</style>

</head>

<body>

<h1>Japan Battery Market Intelligence</h1>

<p>일본 배터리 산업 뉴스 및 공급망 인사이트</p>

<h2>Daily Reports</h2>

<ul id="report-list"></ul>

<h2>Supply Chain Network</h2>

<a href="network.html">Japan Battery Supply Chain Map</a>

<script>

async function loadReports(){

try{

let response = await fetch("https://api.github.com/repos/JWYOUN-1220/japan-battery-intelligence/contents/reports");

let data = await response.json();

let list = document.getElementById("report-list");

data
.filter(file => file.name.endsWith(".html"))
.sort((a,b)=> b.name.localeCompare(a.name))
.forEach(file =>{

let li = document.createElement("li");

let link = document.createElement("a");

link.href = "reports/" + file.name;

link.textContent = file.name.replace(".html","");

li.appendChild(link);

list.appendChild(li);

});

}catch(e){

console.log("report loading error",e);

}

}

loadReports();

</script>

</body>

</html>
